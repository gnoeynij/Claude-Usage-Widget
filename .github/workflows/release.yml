name: Release

# 트리거: 버전 태그 push 또는 수동 dispatch.
# - `v1.2.3` → 정식 release
# - `v1.2.3-rc1` 처럼 dash 포함 → prerelease 자동
on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies
        run: npm install

      # cargo test 가 lib 을 컴파일하면 tauri::generate_context! 매크로가
      # frontendDist("../dist") 를 macro-expansion 시점에 읽는다. dist 가 없으면
      # 단위 테스트 빌드조차 proc macro panic 으로 실패 — clean CI 에서만 드러나고
      # (로컬은 dist 가 남아 있어 통과) tauri-action 뒤로 가기 전 게이트를 막는다.
      # 그래서 test 전에 frontend 를 먼저 빌드한다. tauri-action 이 뒤에서 다시
      # 빌드하지만 vite build 는 빠르다. (회귀: v2.1.5 첫 발행 실패 원인)
      - name: Build frontend (so cargo test can compile)
        run: npm run build

      # 순수 함수 단위 테스트 (pricing 12 + jsonl_aggregator 8) 게이트.
      # tauri-action 앞에 둬서 실패 시 빌드·release 발행이 차단된다. 양 OS
      # matrix 에서 각각 실행 — 이전엔 Windows 로컬만 돌던 macOS 검증 공백을 메움.
      - name: Run Rust unit tests
        working-directory: ./src-tauri
        run: cargo test

      # docs/release-notes/<tag>.md 파일을 release body 로 주입. 파일 없으면
      # 빈 body + workflow warning. matrix 의 두 OS runner 가 동일 body 를
      # set 해도 tauri-action 이 *첫 호출 wins* 라 race 안전.
      - name: Read release notes
        id: notes
        shell: bash
        run: |
          NOTES_FILE="docs/release-notes/${{ github.ref_name }}.md"
          if [ -f "$NOTES_FILE" ]; then
            {
              echo "body<<RELEASE_NOTES_EOF"
              cat "$NOTES_FILE"
              echo "RELEASE_NOTES_EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "body=" >> "$GITHUB_OUTPUT"
            echo "::warning::Release notes file not found: $NOTES_FILE"
          fi

      # Tauri 공식 action — 양 OS 의 bundle/sign/release upload 를 한 번에.
      # bundle.targets 가 tauri.conf.json 에 `["nsis", "app", "dmg"]` 로
      # 설정되어 있어 host OS 에 맞는 산출물 (Windows: nsis, macOS: app+dmg)
      # 만 자동 생성. includeUpdaterJson 으로 latest.json 도 합본 자동 생성.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          # v2.0.2 → 정식, v2.0.2-rc1 → prerelease (dash 포함 자동 판별)
          prerelease: ${{ contains(github.ref_name, '-') }}
          includeUpdaterJson: true
